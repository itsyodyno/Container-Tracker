<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Tracker</title>
<style>
  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --border: #E2E5EB;
    --border-strong: #C8CDD8;
    --text: #111827;
    --text-muted: #6B7280;
    --text-light: #9CA3AF;
    --accent: #1B4FD8;
    --accent-light: #EEF2FF;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.10);
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 50; }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
  .nav-brand svg { color: var(--accent); }
  .nav-actions { display: flex; align-items: center; gap: 8px; }

  /* MAIN */
  main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; box-shadow: var(--shadow); }
  .stat-card .s-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-card .s-val { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  .s-blue { color: #1B4FD8; }
  .s-green { color: #15803D; }
  .s-amber { color: #B45309; }
  .s-red { color: #B91C1C; }
  .s-gray { color: var(--text); }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
  .toolbar input[type=text] { flex: 1; min-width: 200px; max-width: 300px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font); background: var(--surface); color: var(--text); outline: none; }
  .toolbar input[type=text]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(27,79,216,0.1); }
  .toolbar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font); background: var(--surface); color: var(--text); outline: none; cursor: pointer; }
  .toolbar select:focus { border-color: var(--accent); }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; font-family: var(--font); cursor: pointer; transition: all 0.15s; border: 1px solid transparent; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1642B8; }
  .btn-outline { background: var(--surface); color: var(--text); border-color: var(--border); }
  .btn-outline:hover { background: var(--bg); border-color: var(--border-strong); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger-sm { background: none; border: 1px solid #FCA5A5; color: #B91C1C; padding: 5px 10px; font-size: 12px; border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font); font-weight: 500; }
  .btn-danger-sm:hover { background: #FEF2F2; }

  /* TABLE */
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  thead th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; background: var(--bg); border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #FAFBFF; }
  .td-id { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--accent); }
  .td-port { font-size: 13px; }
  .td-muted { color: var(--text-muted); }
  .td-actions { display: flex; gap: 6px; white-space: nowrap; }
  .td-notes { max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-muted); font-size: 12px; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; white-space: nowrap; }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .b-transit { background: #EEF2FF; color: #3730A3; }
  .b-transit::before { background: #6366F1; }
  .b-arrived { background: #F0FDF4; color: #15803D; }
  .b-arrived::before { background: #22C55E; }
  .b-delayed { background: #FFFBEB; color: #B45309; }
  .b-delayed::before { background: #F59E0B; }
  .b-customs { background: #FFF7ED; color: #C2410C; }
  .b-customs::before { background: #F97316; }
  .b-paid { background: #F0FDF4; color: #15803D; }
  .b-unpaid { background: #FEF2F2; color: #B91C1C; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 4rem 1rem; }
  .empty-state svg { margin: 0 auto 1rem; opacity: 0.25; display: block; }
  .empty-state p { color: var(--text-muted); font-size: 14px; }
  .empty-state .e-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; box-shadow: var(--shadow-md); }
  .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
  .modal-close:hover { background: var(--bg); color: var(--text); }
  .modal-body { padding: 1.25rem 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .field input, .field select, .field textarea { padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font); color: var(--text); background: var(--surface); outline: none; width: 100%; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(27,79,216,0.1); }
  .field textarea { resize: vertical; min-height: 72px; }
  .field .hint { font-size: 11px; color: var(--text-light); }
  .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  /* TOAST */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #111827; color: #fff; padding: 10px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .modal-body { grid-template-columns: 1fr; }
    .field.full { grid-column: 1; }
    nav { padding: 0 1rem; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .s-val { font-size: 22px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7-6H4a2 2 0 0 0-2 2v16z"/>
      <path d="M14 2v6h6"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="8" y1="9" x2="10" y2="9"/>
    </svg>
    Container Tracker
  </div>
  <div class="nav-actions">
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add container
    </button>
  </div>
</nav>

<main>
  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="🔍  Search by ID, port, cargo…" oninput="render()">
    <select id="filterStatus" onchange="render()">
      <option value="">All statuses</option>
      <option>In Transit</option>
      <option>Arrived</option>
      <option>Delayed</option>
      <option>Customs Hold</option>
    </select>
    <select id="filterBalance" onchange="render()">
      <option value="">Balance: all</option>
      <option value="Yes">Paid</option>
      <option value="No">Unpaid</option>
    </select>
    <select id="sortBy" onchange="render()">
      <option value="added">Sort: newest first</option>
      <option value="eta">Sort: ETA</option>
      <option value="id">Sort: container ID</option>
    </select>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Container ID</th>
            <th>Origin</th>
            <th>Destination</th>
            <th>ETA</th>
            <th>Status</th>
            <th>Cargo</th>
            <th>Weight (kg)</th>
            <th>Balance</th>
            <th>Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h3 id="modalTitle">Add container</h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field full">
        <label>Container ID *</label>
        <input type="text" id="f_id" placeholder="e.g. MSCU1234567">
        <span class="hint">Must be unique — used to identify the container</span>
      </div>
      <div class="field">
        <label>Origin port *</label>
        <input type="text" id="f_origin" placeholder="e.g. Shanghai, CN">
      </div>
      <div class="field">
        <label>Destination port *</label>
        <input type="text" id="f_dest" placeholder="e.g. Singapore, SG">
      </div>
      <div class="field">
        <label>ETA</label>
        <input type="date" id="f_eta">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f_status">
          <option>In Transit</option>
          <option>Arrived</option>
          <option>Delayed</option>
          <option>Customs Hold</option>
        </select>
      </div>
      <div class="field">
        <label>Cargo description</label>
        <input type="text" id="f_cargo" placeholder="e.g. Electronics">
      </div>
      <div class="field">
        <label>Weight (kg)</label>
        <input type="number" id="f_weight" placeholder="e.g. 12500">
      </div>
      <div class="field">
        <label>Balance paid?</label>
        <select id="f_balance">
          <option value="No">No — unpaid</option>
          <option value="Yes">Yes — paid</option>
        </select>
      </div>
      <div class="field full">
        <label>Notes / custom info</label>
        <textarea id="f_notes" placeholder="Vessel name, booking ref, contact, etc."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveContainer()">Save container</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'ct_containers_v1';
let containers = [];
let editIdx = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) containers = JSON.parse(raw);
  } catch(e) { containers = []; }
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(containers)); } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function statusBadge(s) {
  const map = {'In Transit':'b-transit','Arrived':'b-arrived','Delayed':'b-delayed','Customs Hold':'b-customs'};
  return `<span class="badge ${map[s]||'b-transit'}">${s}</span>`;
}

function balanceBadge(b) {
  return b === 'Yes'
    ? `<span class="badge b-paid">✓ Paid</span>`
    : `<span class="badge b-unpaid">✗ Unpaid</span>`;
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const fs = document.getElementById('filterStatus').value;
  const fb = document.getElementById('filterBalance').value;
  const sort = document.getElementById('sortBy').value;

  let list = containers.map((c, i) => ({ ...c, _i: i })).filter(c => {
    const txt = [c.id, c.origin, c.dest, c.cargo, c.notes].join(' ').toLowerCase();
    return (!q || txt.includes(q)) && (!fs || c.status === fs) && (!fb || c.balance === fb);
  });

  if (sort === 'eta') list.sort((a,b) => (a.eta||'9999') > (b.eta||'9999') ? 1 : -1);
  else if (sort === 'id') list.sort((a,b) => a.id.localeCompare(b.id));
  else list.sort((a,b) => (b._i - a._i));

  const tbody = document.getElementById('tbody');
  if (list.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <p class="e-title">${containers.length === 0 ? 'No containers yet' : 'No results'}</p>
        <p>${containers.length === 0 ? 'Add your first container using the button above.' : 'Try changing your search or filters.'}</p>
      </div>
    </td></tr>`;
  } else {
    tbody.innerHTML = list.map(c => {
      const w = c.weight ? Number(c.weight).toLocaleString() : '—';
      return `<tr>
        <td class="td-id">${c.id}</td>
        <td class="td-port">${c.origin||'—'}</td>
        <td class="td-port">${c.dest||'—'}</td>
        <td class="td-muted">${formatDate(c.eta)}</td>
        <td>${statusBadge(c.status)}</td>
        <td>${c.cargo||'—'}</td>
        <td class="td-muted">${w}</td>
        <td>${balanceBadge(c.balance)}</td>
        <td class="td-notes" title="${c.notes||''}">${c.notes||'—'}</td>
        <td>
          <div class="td-actions">
            <button class="btn btn-outline btn-sm" onclick="editContainer(${c._i})">Edit</button>
            <button class="btn-danger-sm" onclick="deleteContainer(${c._i})">Delete</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  const total = containers.length;
  const inTransit = containers.filter(c => c.status === 'In Transit').length;
  const arrived = containers.filter(c => c.status === 'Arrived').length;
  const delayed = containers.filter(c => c.status === 'Delayed' || c.status === 'Customs Hold').length;
  const unpaid = containers.filter(c => c.balance === 'No').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="s-label">Total</div><div class="s-val s-gray">${total}</div></div>
    <div class="stat-card"><div class="s-label">In Transit</div><div class="s-val s-blue">${inTransit}</div></div>
    <div class="stat-card"><div class="s-label">Arrived</div><div class="s-val s-green">${arrived}</div></div>
    <div class="stat-card"><div class="s-label">Delayed / Hold</div><div class="s-val s-amber">${delayed}</div></div>
    <div class="stat-card"><div class="s-label">Balance Unpaid</div><div class="s-val s-red">${unpaid}</div></div>`;
}

function openModal(idx = null) {
  editIdx = idx;
  const c = idx !== null ? containers[idx] : null;
  document.getElementById('modalTitle').textContent = c ? 'Edit container' : 'Add container';
  document.getElementById('f_id').value = c?.id || '';
  document.getElementById('f_id').disabled = !!c;
  document.getElementById('f_origin').value = c?.origin || '';
  document.getElementById('f_dest').value = c?.dest || '';
  document.getElementById('f_eta').value = c?.eta || '';
  document.getElementById('f_status').value = c?.status || 'In Transit';
  document.getElementById('f_cargo').value = c?.cargo || '';
  document.getElementById('f_weight').value = c?.weight || '';
  document.getElementById('f_balance').value = c?.balance || 'No';
  document.getElementById('f_notes').value = c?.notes || '';
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('f_id').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editIdx = null;
}

function saveContainer() {
  const id = document.getElementById('f_id').value.trim().toUpperCase();
  const origin = document.getElementById('f_origin').value.trim();
  const dest = document.getElementById('f_dest').value.trim();
  if (!id) { alert('Container ID is required.'); return; }
  if (!origin || !dest) { alert('Origin and destination ports are required.'); return; }
  if (editIdx === null && containers.find(c => c.id === id)) {
    alert(`Container "${id}" already exists. Use Edit to update it.`); return;
  }
  const entry = {
    id, origin, dest,
    eta: document.getElementById('f_eta').value,
    status: document.getElementById('f_status').value,
    cargo: document.getElementById('f_cargo').value.trim(),
    weight: document.getElementById('f_weight').value,
    balance: document.getElementById('f_balance').value,
    notes: document.getElementById('f_notes').value.trim(),
    updatedAt: new Date().toISOString()
  };
  if (editIdx !== null) {
    containers[editIdx] = entry;
    showToast('Container updated ✓');
  } else {
    containers.push(entry);
    showToast('Container added ✓');
  }
  saveData(); closeModal(); render();
}

function editContainer(idx) { openModal(idx); }

function deleteContainer(idx) {
  const c = containers[idx];
  if (!confirm(`Delete container ${c.id}? This cannot be undone.`)) return;
  containers.splice(idx, 1);
  saveData(); render();
  showToast('Container deleted');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadData();
render();
</script>
</body>
</html>
